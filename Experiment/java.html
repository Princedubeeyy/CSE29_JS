<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
    }

    #count {
      font-size: 40px;
      margin: 20px 0;
      color: #333;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .inc { background-color: #28a745; color: white; }
    .dec { background-color: #dc3545; color: white; }
    .reset { background-color: #007bff; color: white; }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Counter App</h1>
    <div id="count">0</div>

    <button class="inc" onclick="increment()">+</button>
    <button class="dec" onclick="decrement()">-</button>
    <button class="reset" onclick="reset()">Reset</button>
  </div>

  <script>
    let count = 0;

    function updateDisplay() {
      document.getElementById("count").innerText = count;
    }

    function increment() {
      count++;
      updateDisplay();
    }

    function decrement() {
      count--;
      updateDisplay();
    }

    function reset() {
      count = 0;
      updateDisplay();
    }
  </script>

</body>
</html>
