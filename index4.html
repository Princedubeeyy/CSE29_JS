<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography in Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-4xl font-bold mb-6 text-center">Typography in Tailwind CSS</h1>

    <p class="text-base leading-relaxed text-gray-700 mb-4">This is a simple paragraph to demonstrate the typography options available in Tailwind CSS.</p>

    <h2 class="text-2xl font-semibold mb-4">Heading 2</h2>
    <p class="text-lg leading-relaxed text-red-700 mb-6">This is a paragraph with a larger font size and more relaxed line height.</p>

    <p class="text-xl font-semibold tracking-wide text-blue-700 mb-4">This is a paragraph with a very large font size and wide letter spacing.</p>
</body>
</html>
