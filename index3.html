<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Grid Example</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-3xl font-bold mb-6">Grid Example with Tailwind CSS</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <div class="p-6 bg-blue-500 shadow rounded text-white">Card 1</div>
        <div class="p-6 bg-green-500 shadow rounded text-white">Card 2</div>
        <div class="p-6 bg-red-500 shadow rounded text-white">Card 3</div>
        <div class="p-6 bg-yellow-500 shadow rounded text-white">Card 4</div>
        <div class="p-6 bg-purple-500 shadow rounded text-white">Card 5</div>
        <div class="p-6 bg-pink-500 shadow rounded text-white">Card 6</div>
    
</body>
</html>
